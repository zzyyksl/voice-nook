<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Rhys</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── Design System: Obsidian Black / Dark Glass ──
   tokens: engraved bg · frosted glass · thin white edge · soft glow
   large radius · minimal blue accent */
:root{
  --bg:#070709;
  --fg:#ecebe8;
  --hint:#9a97a0;
  --hint-dim:#6b6873;
  --glass:rgba(255,255,255,.045);
  --glass-2:rgba(255,255,255,.08);
  --edge:rgba(255,255,255,.12);
  --edge-hi:rgba(255,255,255,.22);
  --acc:#8ea4ff;
  --card:rgba(16,16,22,.55);
  --r-lg:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{background:transparent;color:var(--fg);font:15px/1.7 -apple-system,"PingFang SC",sans-serif;min-height:100vh}

/* engraved background + dot grid, fixed behind everything */
.bg-tex{position:fixed;inset:0;z-index:-1;pointer-events:none;background:url(/assets/night-texture.jpg) center top/cover no-repeat var(--bg)}
.bg-tex::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,7,9,.3),rgba(7,7,9,.55) 70%,rgba(7,7,9,.7))}


/* top tabs */
.tabs{display:flex;position:sticky;top:0;z-index:10;background:rgba(7,7,9,.68);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06)}
.tab{flex:1;text-align:center;padding:13px 0;font-size:15px;font-weight:500;color:var(--hint);position:relative;transition:color .2s}
.tab.active{color:var(--fg);font-weight:600}
.tab.active::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:58%;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);box-shadow:0 0 12px rgba(255,255,255,.35)}
.panel{display:none;padding:16px 14px calc(46px + env(safe-area-inset-bottom))}
.panel.active{display:block}

h1{font-size:16px;margin:8px 2px 16px;font-weight:600;letter-spacing:.3px}
h1 small{color:var(--hint-dim);font-weight:400;font-size:12px;margin-left:8px}

/* glass card */
.card{position:relative;background:var(--glass);border:1px solid var(--edge);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1)}
.ts{font-size:11px;color:var(--hint-dim);margin-bottom:6px;letter-spacing:.2px}
.txt{white-space:pre-wrap;word-break:break-word;max-height:96px;overflow:hidden;position:relative;transition:max-height .25s}
.card.open .txt{max-height:none}
.card:not(.open) .txt::after{content:"";position:absolute;left:0;right:0;bottom:0;height:34px;background:linear-gradient(transparent,rgba(13,13,17,.92))}
.more{color:var(--acc);font-size:12px;margin-top:6px;display:inline-block}
.empty{color:var(--hint-dim);text-align:center;margin-top:60px}
#load,#histLoad{display:block;margin:16px auto;background:var(--glass);border:1px solid var(--edge);color:var(--hint);border-radius:999px;padding:8px 26px;font-size:13px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

/* voice orb */
.call-wrap{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;flex-direction:column;align-items:stretch;padding:8px 14px calc(12px + env(safe-area-inset-bottom));background:rgba(13,13,17,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--edge)}
.call-status{font-size:12.5px;color:var(--hint);margin-bottom:7px;min-height:18px;text-align:center;letter-spacing:.3px}
.call-btn{width:100%;height:54px;border-radius:999px;border:1px solid rgba(255,255,255,.42);background:linear-gradient(160deg,rgba(255,255,255,.14),rgba(255,255,255,.04));color:var(--fg);font-size:15px;letter-spacing:2px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 28px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.18);touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.call-btn:active,.call-btn.recording{transform:scale(1.02)}
.call-btn.recording{border-color:rgba(255,255,255,.65);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 30px 80px rgba(0,0,0,.8),0 0 38px rgba(255,255,255,.22),inset 0 2px 8px rgba(255,255,255,.3),inset 0 -22px 44px rgba(0,0,0,.55)}50%{box-shadow:0 30px 80px rgba(0,0,0,.8),0 0 62px rgba(255,255,255,.42),inset 0 2px 8px rgba(255,255,255,.3),inset 0 -22px 44px rgba(0,0,0,.55)}}
.call-btn.processing{color:var(--hint);border-color:var(--edge);animation:none;box-shadow:0 30px 80px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.12),inset 0 -22px 44px rgba(0,0,0,.55)}
.call-btn.disabled{opacity:.45;pointer-events:none}
.ws-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
.ws-dot.on{background:#6fe08a;box-shadow:0 0 8px rgba(111,224,138,.8)}
.ws-dot.off{background:#e85d75;box-shadow:0 0 8px rgba(232,93,117,.7)}

/* capsule sub-tabs */
.subtabs{display:flex;gap:12px;margin:26px 2px 18px}
.subtab{flex:1;text-align:center;padding:13px 0;font-size:14px;border-radius:999px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.14);color:var(--hint);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 6px 18px rgba(0,0,0,.4);transition:.2s}
.subtab.active{color:var(--fg);background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.34);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 0 16px rgba(255,255,255,.06),0 6px 18px rgba(0,0,0,.4)}

/* conversation bubbles */
.msg{width:fit-content;max-width:82%;padding:9px 14px;border-radius:18px;margin-bottom:10px;font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.msg.me{margin-left:auto;background:linear-gradient(145deg,rgba(112,132,214,.66),rgba(74,90,168,.6));border:1px solid rgba(160,178,255,.4);color:#f2f4ff;border-bottom-right-radius:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 6px 18px rgba(0,0,0,.35)}
.msg.ai{margin-right:auto;width:100%;max-width:100%;background:var(--glass);border:1px solid var(--edge);border-radius:18px;padding:13px 16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 6px 18px rgba(0,0,0,.35)}
.msg.pending{opacity:.5}
.session-empty{color:var(--hint-dim);text-align:center;font-size:13px;margin:26px 0}

/* history */
.hist-q{font-size:14px;margin-bottom:4px}
.hist-q b,.hist-a b{font-weight:600;color:var(--hint-dim);font-size:12px;margin-right:8px}
.hist-a{font-size:14px;color:var(--fg)}
.sess-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.sess-title{font-weight:600;font-size:14px;flex:1;min-width:0}
.sess-head .more{margin-top:0;flex-shrink:0}
.sess-head input{flex:1;min-width:0;font:inherit;font-weight:600;font-size:14px;border:1px solid var(--edge-hi);border-radius:10px;padding:3px 10px;background:rgba(255,255,255,.06);color:var(--fg);outline:none}
.hist-item{border-top:1px solid rgba(255,255,255,.08);padding-top:9px;margin-top:9px}
.replay{display:block;margin-top:5px;font-size:12.5px;color:var(--acc)}
.msg.ai .replay{color:var(--acc)}
.zh-box{font-size:13px;color:var(--hint);margin-top:5px;white-space:pre-wrap;border-top:1px dashed rgba(255,255,255,.12);padding-top:5px}
.chev{color:var(--hint-dim);font-size:12px;transition:transform .2s;display:inline-block;flex-shrink:0}
.card.open .chev{transform:rotate(90deg)}
.sess-body{display:none}
.card.open .sess-body{display:block}
/* ── theme toggle button ── */
.theme-toggle{flex:0 0 50px;align-self:center;margin:0 10px;padding:5px 0;text-align:center;font-size:12px;border-radius:999px;border:1px solid var(--edge);background:var(--glass);color:var(--hint);cursor:pointer;user-select:none;-webkit-user-select:none}

/* ── Day theme: cream paper / sage green / hand-drawn garden ── */
body.day{color:#3a362d}
body.day .bg-tex{background:#f2eee5}
body.day .bg-tex::before{background:none}
body.day .bg-tex::after{content:"";position:absolute;inset:0;background:url(/assets/day-overlay.png) left bottom no-repeat,url(/assets/day-title-leaf.png) right bottom no-repeat;background-size:118px auto,86px auto}
body.day .tabs{background:rgba(242,238,229,.85);border-bottom:1px solid rgba(90,85,60,.12)}
body.day .tab{color:#97917d}
body.day .tab.active{color:#3a362d}
body.day .tab.active::after{background:linear-gradient(90deg,transparent,rgba(109,127,84,.9),transparent);box-shadow:none}
body.day .theme-toggle{border-color:#d5cdb2;background:#faf7ee;color:#7c7458}
body.day h1{position:relative;background:url(/assets/day-title.png) center/contain no-repeat;aspect-ratio:3.29;height:auto;margin:2px 0 14px;font-size:0}
body.day h1 small{position:absolute;left:76.7%;top:54.1%;transform:translate(-50%,-50%);font-size:12px;margin:0;color:#8a7f5e;font-weight:600;white-space:nowrap;background:none;border:none;padding:0}
body.day #sub-history::before{content:"";display:block;width:100%;aspect-ratio:3.83;background:url(/assets/day-header.png) center/contain no-repeat;margin:2px 0 10px}
body.day .card{background:#faf7ee;border:1px solid #e3dcc6;box-shadow:0 2px 10px rgba(120,110,80,.12)}
body.day #list .card:nth-child(2n+1)::after{content:"";position:absolute;right:-4px;bottom:-6px;width:46px;height:46px;background:url(/assets/day-card-leaf.png) center/contain no-repeat;pointer-events:none}
body.day .ts{color:#aba489}
body.day .card:not(.open) .txt::after{background:linear-gradient(transparent,rgba(250,247,238,.95))}
body.day .more,body.day .replay,body.day .msg.ai .replay{color:#6d7f54}
body.day .empty,body.day .session-empty{color:#aba489}
body.day #load,body.day #histLoad{background:#faf7ee;border:1px solid #d5cdb2;color:#97917d}
body.day .call-status{color:#97917d}
body.day .call-btn{width:100%;height:58px;border-radius:999px;border:1px solid #d8d0b4;background:url(/assets/day-vine-bar.png) center/auto 78% no-repeat,#faf7ee;color:transparent;box-shadow:0 3px 12px rgba(120,110,80,.18)}body.day .call-btn.recording{color:transparent;box-shadow:0 0 20px rgba(126,142,90,.65);border-color:#a8b287}body.day .call-btn.processing{color:transparent}
body.day .call-btn.recording{animation:none;border:none;filter:drop-shadow(0 0 16px rgba(126,142,90,.55))}
body.day .call-btn.processing{color:#97917d;box-shadow:none;border:none}
body.day .subtab{background:#faf7ee;border:1px solid #d8d0b4;color:#97917d;box-shadow:0 2px 8px rgba(120,110,80,.12)}
body.day .subtab.active{background:#7f8d63;border-color:#6f7d55;color:#f7f5e8;box-shadow:0 2px 10px rgba(111,125,85,.35)}
body.day .msg.me{background:#7f8d63;border:1px solid #6f7d55;color:#f7f5e8;box-shadow:0 2px 8px rgba(111,125,85,.3)}
body.day .msg.ai{background:#fdfbf3;border:1px solid #e3dcc6;color:#3a362d;box-shadow:0 2px 10px rgba(120,110,80,.12)}
body.day .hist-q b,body.day .hist-a b{color:#aba489}
body.day .hist-a{color:#3a362d}
body.day .hist-item{border-top:1px solid #ece5d0}
body.day .sess-head input{background:#fffdf6;border:1px solid #cfc7ab;color:#3a362d}
body.day .zh-box{color:#97917d;border-top:1px dashed #d8d0b4}
body.day .chev{color:#aba489}
body.day .call-wrap{background:rgba(242,238,229,.94);border-top:1px solid rgba(90,85,60,.15)}
body.day .call-btn.recording{filter:none;box-shadow:0 0 18px rgba(126,142,90,.6)}
#p-call{padding-bottom:120px}
</style></head><body>
<div class="bg-tex"></div>
<div class="tabs">
  <div class="tab active" data-tab="thinking">thinking</div>
  <div class="tab" data-tab="call">通话</div>
  <div class="theme-toggle" id="themeToggle">夜</div>
</div>

<div class="panel active" id="p-thinking">
  <h1>Rhys 的 thinking<small id="count"></small></h1>
  <div id="list"></div>
  <button id="load" hidden>再往前翻</button>
  <div class="empty" id="empty" hidden>还没抓到东西，等他想点什么</div>
</div>

<div class="panel" id="p-call">
  <div class="call-wrap">
    <div class="call-status" id="callStatus"><span class="ws-dot off" id="wsDot"></span>连接中...</div>
    <button class="call-btn disabled" id="callBtn">按住说话</button>
  </div>
  <div class="subtabs">
    <div class="subtab active" data-sub="session">本次通话</div>
    <div class="subtab" data-sub="history">历史记录</div>
  </div>
  <div id="sub-session">
    <div id="sessionLog"></div>
    <div class="session-empty" id="sessionEmpty">还没说话，按住下面的按钮</div>
  </div>
  <div id="sub-history" hidden>
    <div id="histList"></div>
    <button id="histLoad" hidden>再往前翻</button>
    <div class="session-empty" id="histEmpty" hidden>还没有历史通话</div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp; tg?.ready(); tg?.expand();
const initData = tg?.initData || '';

// tabs
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab,.panel').forEach(e => e.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('p-' + t.dataset.tab).classList.add('active');
  if (t.dataset.tab === 'call' && !wsConn) connectWS();
});

// sub-tabs in call panel
document.querySelectorAll('.subtab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.subtab').forEach(e => e.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('sub-session').hidden = t.dataset.sub !== 'session';
  document.getElementById('sub-history').hidden = t.dataset.sub !== 'history';
  if (t.dataset.sub === 'history' && !histLoaded) { histLoaded = true; fetchCalls(); }
});

// ── thinking ──
let offset = 0; const N = 30;
async function fetchPage(){
  const r = await fetch('/api/list?offset='+offset+'&limit='+N, {headers:{'x-init-data': initData}});
  if(r.status===403){document.getElementById('empty').hidden=false;document.getElementById('empty').textContent='这本书只给小猫看';return}
  const d = await r.json();
  document.getElementById('count').textContent = d.total+' 条';
  const list = document.getElementById('list');
  for(const e of d.items){
    const c = document.createElement('div'); c.className='card';
    const t = new Date(e.ts).toLocaleString('zh-CN',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    c.innerHTML = '<div class="ts">'+t+'</div><div class="txt"></div><span class="more">展开</span>';
    c.querySelector('.txt').textContent = e.zh || e.text;
    c.onclick = ()=>{c.classList.toggle('open');c.querySelector('.more').textContent=c.classList.contains('open')?'收起':'展开'};
    list.appendChild(c);
  }
  offset += d.items.length;
  document.getElementById('load').hidden = offset >= d.total;
  document.getElementById('empty').hidden = d.total > 0;
}
document.getElementById('load').onclick = fetchPage;
fetchPage();

// ── session log (本次通话) ──
const sessionLog = document.getElementById('sessionLog');
const sessionEmpty = document.getElementById('sessionEmpty');
let pendingBubble = null;

function addMsg(cls, text, pending) {
  sessionEmpty.hidden = true;
  const d = document.createElement('div');
  d.className = 'msg ' + cls + (pending ? ' pending' : '');
  d.textContent = text;
  sessionLog.appendChild(d);
  d.scrollIntoView({ block: 'nearest' });
  return d;
}

// ── shared audio player: one voice at a time, tap again to stop ──
let player = null, playerBtn = null;
function stopPlayer(){
  if (player) { try { player.pause(); } catch {} }
  if (playerBtn) playerBtn.textContent = playerBtn.dataset.label;
  player = null; playerBtn = null;
}
function playToggle(src, el){
  if (player && playerBtn === el) { stopPlayer(); return; }
  stopPlayer();
  player = new Audio(src); playerBtn = el;
  el.textContent = '停止播放';
  player.onended = player.onerror = () => { if (playerBtn === el) stopPlayer(); };
  player.play().catch(() => { if (playerBtn === el) stopPlayer(); });
}
function replayBtn(src, label){
  const p = document.createElement('span'); p.className = 'replay';
  p.dataset.label = label; p.textContent = label;
  p.onclick = (ev) => { ev.stopPropagation(); playToggle(src, p); };
  return p;
}
function zhToggle(zh){
  const wrap = document.createElement('div');
  const btn = document.createElement('span'); btn.className = 'replay'; btn.textContent = '看翻译';
  const box = document.createElement('div'); box.className = 'zh-box'; box.hidden = true; box.textContent = zh;
  btn.onclick = (ev) => { ev.stopPropagation(); box.hidden = !box.hidden; btn.textContent = box.hidden ? '看翻译' : '收起翻译'; };
  wrap.append(btn, box);
  return wrap;
}

// ── history (历史记录，按 session 分组) ──
let histLoaded = false, histOffset = 0; const HN = 10;
function fmtTime(ts, withDate){
  const o = withDate ? {hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'} : {hour12:false,hour:'2-digit',minute:'2-digit'};
  return new Date(ts).toLocaleString('zh-CN', o);
}
function defaultTitle(s){
  const d = new Date(s.start);
  return (d.getMonth()+1) + '月' + d.getDate() + '日的通话';
}
async function fetchCalls(){
  const r = await fetch('/api/calls?offset='+histOffset+'&limit='+HN, {headers:{'x-init-data': initData}});
  if(!r.ok) return;
  const d = await r.json();
  const list = document.getElementById('histList');
  for(const s of d.items){
    const c = document.createElement('div'); c.className='card';
    const head = document.createElement('div'); head.className='sess-head';
    const chev = document.createElement('span'); chev.className='chev'; chev.textContent='▸';
    const ttl = document.createElement('span'); ttl.className='sess-title';
    ttl.textContent = s.title || defaultTitle(s);
    const ren = document.createElement('span'); ren.className='more'; ren.textContent='改名';
    let inp = null;
    ren.onclick = async (ev) => {
      ev.stopPropagation();
      if (!inp) {
        inp = document.createElement('input');
        inp.value = s.title || ''; inp.placeholder = '给这次通话起个名字';
        inp.onclick = (e2) => e2.stopPropagation();
        ttl.replaceWith(inp); ren.textContent = '保存'; inp.focus();
      } else {
        const t = inp.value.trim(); ren.textContent = '…';
        try {
          await fetch('/api/session-title', {method:'POST',
            headers:{'x-init-data': initData, 'content-type':'application/json'},
            body: JSON.stringify({id: s.id, title: t})});
          s.title = t || null;
        } catch {}
        ttl.textContent = s.title || defaultTitle(s);
        inp.replaceWith(ttl); inp = null; ren.textContent = '改名';
      }
    };
    head.append(chev, ttl, ren);
    const meta = document.createElement('div'); meta.className='ts';
    const range = fmtTime(s.start, true) + (s.end !== s.start ? ' – ' + fmtTime(s.end, false) : '');
    meta.textContent = range + ' · ' + s.items.length + '句';
    const body = document.createElement('div'); body.className='sess-body';
    for(const e of s.items){
      const item = document.createElement('div'); item.className='hist-item';
      const q = document.createElement('div'); q.className='hist-q';
      q.innerHTML = '<b>我</b>'; q.append(e.q || '');
      const a = document.createElement('div'); a.className='hist-a';
      a.innerHTML = '<b>Rhys</b>'; a.append(e.a || '（没回上）');
      item.append(q, a);
      if (e.audio) item.appendChild(replayBtn('/api/audio/' + e.audio + '?initData=' + encodeURIComponent(initData), '重听这句'));
      if (e.zh) item.appendChild(zhToggle(e.zh));
      body.appendChild(item);
    }
    const tgl = () => c.classList.toggle('open');
    head.onclick = tgl; meta.onclick = tgl;
    c.append(head, meta, body);
    list.appendChild(c);
  }
  histOffset += d.items.length;
  document.getElementById('histLoad').hidden = histOffset >= d.total;
  document.getElementById('histEmpty').hidden = d.total > 0;
}
document.getElementById('histLoad').onclick = fetchCalls;

// ── voice call (WebSocket) ──
const btn = document.getElementById('callBtn');
const status = document.getElementById('callStatus');
const wsDot = document.getElementById('wsDot');
let wsConn = null;
let mediaRec, chunks, stream;
let isProcessing = false;
let lastSendTs = 0;

function resetBtn() {
  isProcessing = false;
  btn.textContent = '按住说话';
  btn.classList.remove('processing');
  status.innerHTML = '<span class="ws-dot on"></span>按住说话';
}

function connectWS() {
  if (wsConn && wsConn.readyState <= 1) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  wsConn = new WebSocket(proto + '//' + location.host + '/ws/voice?initData=' + encodeURIComponent(initData));

  wsConn.onopen = () => {
    wsDot.className = 'ws-dot on';
    status.innerHTML = '<span class="ws-dot on"></span>按住说话';
    btn.classList.remove('disabled');
    btn.textContent = '按住说话';
  };

  wsConn.onclose = () => {
    wsDot.className = 'ws-dot off';
    status.innerHTML = '<span class="ws-dot off"></span>断开了，重连中...';
    btn.classList.add('disabled');
    setTimeout(connectWS, 3000);
  };

  wsConn.onerror = () => {};

  wsConn.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'status') {
        status.innerHTML = '<span class="ws-dot on"></span>' + msg.text;
      } else if (msg.type === 'transcript') {
        addMsg('me', msg.text);
        pendingBubble = addMsg('ai', '……', true);
      } else if (msg.type === 'reply') {
        let b;
        if (pendingBubble) { b = pendingBubble; b.textContent = msg.text; b.classList.remove('pending'); pendingBubble = null; }
        else b = addMsg('ai', msg.text);
        if (msg.audio) {
          const src = 'data:audio/mp3;base64,' + msg.audio;
          const p = replayBtn(src, '重听这句');
          b.appendChild(p);
          playToggle(src, p);
        }
        if (msg.zh) b.appendChild(zhToggle(msg.zh));
        resetBtn();
      } else if (msg.type === 'error') {
        if (pendingBubble) { pendingBubble.textContent = '（' + msg.text + '）'; pendingBubble = null; }
        else addMsg('ai', '（' + msg.text + '）', true);
        resetBtn();
      }
    } catch {}
  };
}

async function startRec() {
  if (isProcessing || !wsConn || wsConn.readyState !== 1) return;
  if (mediaRec && mediaRec.state === 'recording') return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
  } catch(e) { status.textContent = '需要麦克风权限'; return; }
  chunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus' : 'audio/webm;codecs=opus';
  mediaRec = new MediaRecorder(stream, { mimeType });
  mediaRec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
  mediaRec.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    if (chunks.length === 0) return;
    if (Date.now() - lastSendTs < 1500) return;
    lastSendTs = Date.now();
    isProcessing = true;
    btn.textContent = '处理中';
    btn.classList.remove('recording');
    btn.classList.add('processing');
    status.innerHTML = '<span class="ws-dot on"></span>发送中...';
    const blob = new Blob(chunks, { type: mimeType });
    blob.arrayBuffer().then(buf => {
      if (wsConn && wsConn.readyState === 1) {
        wsConn.send(buf);
      }
    });
  };
  mediaRec.start();
  btn.textContent = '松开发送';
  btn.classList.add('recording');
  status.innerHTML = '<span class="ws-dot on"></span>正在听...';
}

function stopRec() {
  if (mediaRec && mediaRec.state === 'recording') mediaRec.stop();
}

btn.addEventListener('touchstart', e => { e.preventDefault(); startRec(); });
btn.addEventListener('touchend', e => { e.preventDefault(); stopRec(); });
btn.addEventListener('touchcancel', e => { e.preventDefault(); stopRec(); });
btn.addEventListener('mousedown', e => { e.preventDefault(); startRec(); });
btn.addEventListener('mouseup', e => { e.preventDefault(); stopRec(); });
btn.addEventListener('mouseleave', e => { if(mediaRec?.state==='recording') stopRec(); });

// Auto-connect when switching to call tab
connectWS();

// ── theme toggle (day / night) ──
const themeBtn = document.getElementById('themeToggle');
function applyTheme(t){
  document.body.classList.toggle('day', t === 'day');
  themeBtn.textContent = t === 'day' ? '日' : '夜';
  try { localStorage.setItem('rhys-theme', t); } catch {}
}
themeBtn.onclick = () => applyTheme(document.body.classList.contains('day') ? 'night' : 'day');
let savedTheme = 'night';
try { savedTheme = localStorage.getItem('rhys-theme') || 'night'; } catch {}
applyTheme(savedTheme);
